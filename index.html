<html lang="en">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0c0a; --surface: #1a1714; --card-bg: #f5f0e8; --card-text: #1a1714;
  --red: #c0392b; --gold: #d4a017; --green: #2d6a4f;
  --text: #f5f0e8; --dim: #8a8070; --border: #2e2a24;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; padding: 16px; overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}
.wrapper { width: 100%; max-width: 440px; position: relative; }
.title-screen { text-align: center; padding: 40px 10px 20px; min-height: 90vh; display: flex; flex-direction: column; justify-content: center; }
.title-screen h1 { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; line-height: 1.1; margin-bottom: 4px; }
.title-screen h1 em { font-style: italic; color: var(--gold); }
.title-screen .sub { font-size: 10px; color: var(--dim); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 28px; }
.title-screen .tagline { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--dim); font-style: italic; line-height: 1.6; margin-bottom: 32px; }
.title-screen .begin-btn {
  background: var(--gold); color: var(--bg); border: none;
  border-radius: 10px; padding: 14px 40px;
  font-family: 'Space Mono', monospace; font-size: 13px;
  font-weight: 700; cursor: pointer; letter-spacing: 2px;
  text-transform: uppercase; transition: all 0.2s;
}
.title-screen .begin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,160,23,0.3); }
.title-screen .credits { font-size: 9px; color: #3a3530; margin-top: 24px; letter-spacing: 1px; }
.archetype-screen { padding: 20px 0; }
.archetype-screen .screen-title { font-family: 'Playfair Display', serif; font-size: 22px; text-align: center; margin-bottom: 4px; }
.archetype-screen .screen-sub { font-size: 10px; color: var(--dim); text-align: center; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px; }
.arch-card {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 12px; padding: 16px 18px; margin-bottom: 10px;
  cursor: pointer; transition: border-color 0.2s, transform 0.2s; position: relative; overflow: hidden;
}
.arch-card.locked { opacity: 0.5; cursor: not-allowed; }
.arch-card:not(.locked):hover, .arch-card.selected { border-color: var(--gold); transform: translateY(-2px); }
.arch-card.selected { box-shadow: 0 0 0 2px var(--gold), 0 4px 16px rgba(212,160,23,0.2); }
.arch-card .arch-emoji { font-size: 28px; margin-bottom: 6px; }
.arch-card .arch-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; margin-bottom: 3px; }
.arch-card .arch-perk { font-size: 10px; color: var(--gold); margin-bottom: 4px; font-weight: 700; }
.arch-card .arch-desc { font-size: 11px; color: var(--dim); line-height: 1.6; margin-bottom: 8px; }
.arch-card .arch-stats { font-size: 9px; color: var(--dim); letter-spacing: 0.5px; }
.arch-card .arch-stats span { margin-right: 8px; }
.arch-card .arch-stats .hi { color: var(--green); }
.arch-card .arch-stats .lo { color: var(--red); }
.header { text-align: center; margin-bottom: 14px; }
.header h1 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; line-height: 1.1; }
.header h1 em { font-style: italic; color: var(--gold); }
.header .sub { font-size: 9px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.semester-badge { display: inline-block; background: var(--border); border: 1px solid #3a3530; border-radius: 4px; padding: 2px 10px; font-size: 10px; color: var(--gold); margin-top: 6px; letter-spacing: 1px; }
.phase-label { font-size: 9px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }
.stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.stat-item { position: relative; }
.stat-top { display: flex; align-items: center; gap: 3px; margin-bottom: 3px; white-space: nowrap; }
.stat-top .stat-emoji { font-size: 12px; flex-shrink: 0; }
.stat-top .stat-name { font-size: 9px; color: var(--text); letter-spacing: 0.3px; opacity: 0.7; }
.stat-top .stat-value { font-size: 12px; font-weight: 700; margin-left: auto; flex-shrink: 0; }
.help-btn { position: fixed; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--dim); font-family: 'Playfair Display', serif; font-size: 16px; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.help-btn:hover { border-color: var(--gold); color: var(--gold); }
.help-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.help-content { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 24px; max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; }
.help-content h2 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 16px; color: var(--gold); }
.help-content p { font-size: 12px; line-height: 1.7; color: var(--text); margin-bottom: 12px; }
.help-content .help-stat { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
.help-content .help-stat .emoji { font-size: 18px; }
.help-content .help-close { width: 100%; padding: 12px; background: var(--gold); color: var(--bg); border: none; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 16px; letter-spacing: 1px; }
.stat-bar { width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; position: relative; }
.stat-fill { height: 100%; background: var(--green); transition: width 0.4s ease, background-color 0.4s ease; }
.stat-bar.red .stat-fill { background: var(--red); animation: pulse 1.5s infinite; }
.stat-bar.yellow .stat-fill { background: #f39c12; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.card-container { position: relative; height: min(420px, 55vh); margin-bottom: 12px; perspective: 1000px; }
.card-ghost { position: absolute; width: 100%; height: 100%; background: var(--card-bg); border: 2px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center; top: 0; left: 0; opacity: 0.15; transform-origin: center; }
.card-ghost:nth-child(1) { transform: translateY(6px) scale(0.97); }
.card-ghost:nth-child(2) { transform: translateY(12px) scale(0.94); }
.card { position: absolute; width: 100%; height: 100%; background: var(--card-bg); color: var(--card-text); border: 2px solid var(--border); border-radius: 14px; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; cursor: grab; user-select: none; will-change: transform, opacity; animation: cardIn 0.3s ease-out; }
@keyframes cardIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.card.dragging { opacity: 0.9; }
.card-emoji { font-size: 24px; margin-bottom: 6px; }
.card-tag { font-size: 9px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
.card-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 10px; line-height: 1.3; }
.card-body { font-size: 12px; line-height: 1.55; margin-bottom: 10px; flex-grow: 1; overflow-y: auto; }
.card-hints { display: flex; justify-content: space-between; margin-bottom: 16px; opacity: 0; transition: opacity 0.3s; }
.card-hint { font-size: 10px; color: var(--dim); text-align: center; max-width: 45%; }
.card-hint.show { opacity: 1; }
.fx-hints { display: flex; gap: 3px; justify-content: center; margin-top: 4px; flex-wrap: wrap; }
.fx-hint { font-size: 10px; opacity: 0.7; }
.fx-hint.up { color: #2d6a4f; }
.fx-hint.down { color: #c0392b; }
.card-controls { display: flex; gap: 8px; }
.card-btn {
  flex: 1; padding: 10px 8px; border: 1px solid var(--card-text);
  border-radius: 8px; background: transparent; color: var(--card-text);
  font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  letter-spacing: 0.5px; line-height: 1.4; text-align: center;
  min-height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden; word-break: break-word;
}
.card-btn:hover { background: var(--card-text); color: var(--card-bg); transform: translateY(-2px); }
.card-btn.left { border-color: var(--green); color: var(--green); }
.card-btn.left:hover { background: var(--green); color: var(--card-bg); border-color: var(--green); }
.card-btn.right { border-color: var(--red); color: var(--red); }
.card-btn.right:hover { background: var(--red); color: var(--card-bg); border-color: var(--red); }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 12px; max-width: 80%; animation: slideUp 0.3s ease-out; z-index: 1000; }
@keyframes slideUp { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
.ending-screen { padding: 20px 0; text-align: center; }
.ending-emoji { font-size: 64px; margin-bottom: 12px; }
.ending-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.ending-sub { font-size: 10px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 16px; }
.ending-body { font-size: 12px; line-height: 1.8; margin-bottom: 20px; color: var(--text); }
.ending-stats { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 20px; text-align: left; font-size: 11px; }
.ending-stats .stat-line { margin-bottom: 6px; display: flex; justify-content: space-between; }
.ending-stats .stat-line:last-child { margin-bottom: 0; }
.ending-advocacy { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 20px; font-size: 11px; line-height: 1.6; }
.ending-advocacy .ad-title { font-weight: 700; margin-bottom: 8px; color: var(--gold); }
.ending-advocacy .ad-stat { margin-bottom: 6px; }
.ending-advocacy .ad-stat strong { color: var(--gold); }
.share-section { margin: 16px 0; }
.share-textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); color: var(--text); font-family: 'Space Mono', monospace;
  font-size: 11px; line-height: 1.5; resize: vertical; margin-bottom: 8px;
}
.share-textarea:focus { border-color: var(--gold); outline: none; }
.share-btn {
  width: 100%; padding: 12px; border: 1px solid var(--gold); border-radius: 8px;
  background: transparent; color: var(--gold); font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  letter-spacing: 1px; text-transform: uppercase;
}
.share-btn:hover { background: var(--gold); color: var(--bg); }
.share-feedback { font-size: 10px; color: var(--gold); text-align: center; margin-top: 6px; min-height: 16px; }
.ending-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
.ending-slot {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); padding: 10px 6px; min-height: 64px; gap: 2px;
}
.ending-slot.locked { opacity: 0.4; }
.ending-slot .slot-emoji { font-size: 20px; line-height: 1; }
.ending-slot .slot-name { font-size: 8px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--dim); }
.ending-slot .slot-lock { font-size: 14px; color: var(--border); }
.ending-slot.unlocked { border-color: var(--gold); background: rgba(212,160,23,0.08); opacity: 1; }
.run-meta { font-size: 10px; color: var(--dim); text-align: center; margin: 12px 0; line-height: 1.6; }
.play-again-btn {
  width: 100%; padding: 14px; background: var(--gold); color: var(--bg);
  border: none; border-radius: 10px; font-family: 'Space Mono', monospace;
  font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 2px;
  text-transform: uppercase; transition: all 0.2s;
}
.play-again-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,160,23,0.3); }
</style>
</head>
<body>
<div class="wrapper" id="app"></div>
<script>
const SAVE_KEY = 'uga_grad_survivor_v2';
const ARCHETYPE_DATA = {
  overachiever: { emoji: '📈', name: 'The Overachiever', perk: 'One More Hour', desc: 'First in, last out. When any stat drops below 20, gain +5 to a random other stat. You compensate.', st: { mind: 50, body: 45, wallet: 65, bonds: 55 } },
  imposter: { emoji: '🎭', name: 'The Imposter', perk: 'Fake It', desc: 'Bonds losses halved (you mask well). Mind losses doubled on comparison cards. Everybody else is smarter.', st: { mind: 35, body: 55, wallet: 65, bonds: 60 } },
  coaster: { emoji: '🛋️', name: 'The Coaster', perk: 'Vibes Only', desc: 'Body and Mind can\'t drop below 15 from a single card. But milestone cards are harder for you.', st: { mind: 65, body: 65, wallet: 55, bonds: 50 } },
  believer: { emoji: '🔬', name: 'The True Believer', perk: 'For Science', desc: 'Every 5th card, gain +10 Mind (you love the work). But Wallet losses are 1.5x (you forget to budget).', st: { mind: 55, body: 50, wallet: 55, bonds: 50 } },
  organizer: { emoji: '✊', name: 'The Organizer', perk: 'Solidarity', desc: 'When Bonds > 50, all stat losses reduced by 3. Unlocks exclusive cards about unionizing and collective action.', st: { mind: 45, body: 50, wallet: 55, bonds: 65 } }
};

const PHASE1_CARDS = [
  { id:'orientation', tag:"Day One", emoji:"🏫", title:"Welcome to the Program", body:"You're sitting in a room of 12 new students. Everyone introduces themselves and their research interests. Half of them will be gone in 3 years. You don't know which half.", cL:"Try to impress everyone", cR:"Listen and observe quietly", eL:{mind:+5, bonds:+10}, eR:{mind:+10, bonds:+5} },
  { id:'first_hpc', tag:"First Day", emoji:"💻", title:"Your First HPC Login", body:"ssh yourname@sapelo2.gacrc.uga.edu. Permission denied. You try again. Permission denied. You email IT. Auto-reply: allow 3-5 business days.", cL:"Ask a senior student for help", cR:"Read the docs (all 47 pages)", eL:{bonds:+10, mind:+5}, eR:{mind:+5, body:-5}, sets:['asked_senior'] },
  { id:'first_rotation', tag:"Rotation", emoji:"🧪", title:"Choosing a Lab", body:"You're rotating through labs. Lab A has funding and a famous PI who's never there. Lab B has a hands-on mentor and zero publications in 2 years. Lab C has free snacks.", cL:"Choose Lab A (prestige)", cR:"Choose Lab B (mentorship)", eL:{bonds:-10, wallet:+15, mind:+10}, eR:{bonds:+20, mind:+10, wallet:-5} },
  { id:'first_ta', tag:"Teaching", emoji:"📚", title:"Your First TA Assignment", body:"BIOL 1107. Intro Biology. 240 undergrads. They will email you at 2am about their grade on a 5-point quiz. One of them will call you 'Professor.' You are 23.", cL:"Over-prepare every lab session", cR:"Wing it like your predecessors did", eL:{mind:+10, body:-10}, eR:{mind:-10, body:+5} },
  { id:'first_conf_poster', tag:"Conference", emoji:"📐", title:"Your First Poster", body:"Your advisor wants you to present a poster at ABRF. You have 3 weeks of preliminary data. You spend 40 hours on the poster design. Nobody visits. One person takes a photo of your QR code.", cL:"Network aggressively anyway", cR:"Stand by your poster loyally", eL:{bonds:+15, mind:-10}, eR:{mind:+5, bonds:+5} },
  { id:'cohort_party', tag:"Social", emoji:"🎉", title:"First Cohort Party", body:"Someone's apartment. Cheap wine. Everyone complains about their PIs. For the first time in weeks, you feel like you belong somewhere. A 4th-year pulls you aside: 'Get out while you can.' They're smiling. You think.", cL:"Stay late, make friends", cR:"Leave early, you have a 7am alignment job", eL:{bonds:+20, mind:+15, body:-5}, eR:{mind:+5, bonds:-5} },
  { id:'imposter_moment', tag:"Existential Event", emoji:"🪞", title:"Everyone Else Gets It", body:"In a journal club, a first-year casually explains a concept you've been pretending to understand for 4 months. They use the word 'trivially.' You nod along. Your impostor syndrome gains a new level.", cL:"Ask them to explain it to you", cR:"Google it later in private", eL:{mind:+10, bonds:+5}, eR:{mind:+5, bonds:-5} },
  { id:'first_pipeline', tag:"Pipeline", emoji:"⚙️", title:"Building Your First Pipeline", body:"Snakemake or Nextflow? You spend 3 days reading documentation. Then you write a bash script with 47 if-statements. It works. You tell no one how it works.", cL:"Refactor it properly", cR:"Ship it, move on", eL:{mind:-10, bonds:+5}, eR:{mind:+5, bonds:-5}, sets:['built_pipeline'] },
  { id:'early_burnout', tag:"Health", emoji:"😴", title:"The First Wall", body:"Semester 2. The novelty has worn off. Your sleep schedule is a suggestion. You've eaten dining hall pizza 4 times this week. Your mom asks if you're okay. You say 'busy.'", cL:"Take a full weekend off", cR:"Push through, it'll pass", eL:{body:+15, mind:+15, bonds:+5}, eR:{body:-10, mind:-5} },
  { id:'first_review', tag:"Milestone", emoji:"📝", title:"First Annual Review", body:"Your committee wants a progress report. You have: one pipeline, two failed experiments, and a half-written lit review your advisor hasn't read. The meeting is in a room with no windows.", cL:"Be honest about your struggles", cR:"Spin everything as 'preliminary data'", eL:{bonds:+10, mind:+5}, eR:{bonds:+5, mind:-10} },
  { id:'quals_announced', tag:"Milestone", emoji:"📋", title:"Qualifying Exam: Scheduled", body:"The graduate coordinator emails the date. It's in 10 weeks. Your committee has been formed. You don't know what two of them study. One of them is in a different building.", cL:"Start studying immediately", cR:"'10 weeks is plenty of time'", eL:{mind:-15, body:-10, bonds:-5}, eR:{mind:+5, bonds:+5}, sets:['quals_scheduled'] },
  { id:'orientation_bbq', tag:'Social', emoji:'🍖', title:'The Grad School BBQ', body:'Free pulled pork in the courtyard. A 6th-year with dark circles tells you about Sapelo2 and scratch directories. You don\'t understand. You nod. You will understand.', cL:'Ask them everything', cR:'Enjoy the food, ignore the warnings', eL:{bonds:+15, mind:-5}, eR:{body:+10, bonds:+5} },
  { id:'lab_philosophy', tag:'Advisor', emoji:'📄', title:'The Lab Philosophy Doc', body:'Your new advisor emails a 3-page document titled "Lab Culture & Expectations." It says things like "growth mindset" and "intellectual humility." It does not mention response times or weekends.', cL:'Read it carefully and follow it', cR:'Skim it and figure things out as you go', eL:{bonds:+10, mind:-5}, eR:{mind:+5, bonds:-5} },
  { id:'stipend_letter', tag:'Day One', emoji:'💌', title:'The Stipend Letter', body:'You open your funding offer. $34,738 per year. Your parents ask what that means. You Google "Athens GA cost of living." You close the tab.', cL:'Ask about summer funding', cR:'Accept and move on', eL:{wallet:+10, bonds:-5}, eR:{mind:-5, wallet:+5} },
  { id:'campus_bus', tag:'Athens Life', emoji:'🚌', title:'Campus Bus at 7:45am', body:'The bus is full. You stand, holding a laptop bag and a cold coffee. The undergrads are sitting. They have housing priority. You commute from the east side. 50 minutes each way.', cL:'Buy a parking pass ($480/yr)', cR:'Keep riding the bus', eL:{wallet:-8, body:+10, mind:+5}, eR:{body:-10, mind:-5, wallet:+5} },
  { id:'farmers_market', tag:'Athens Life', emoji:'🥬', title:'Athens Farmers Market', body:'Saturday morning. The market is beautiful. Local honey, fresh bread, organic everything. Your budget says you can buy vegetables OR coffee. Not both. Athens is gorgeous and you cannot afford it.', cL:'Buy the vegetables (responsible)', cR:'Buy the coffee (survival)', eL:{body:+10, mind:-5, wallet:-5}, eR:{mind:+10, body:-5, wallet:-5} },

  // --- Privilege & Equity (Phase 1) ---
  { id:'first_gen', tag:'Privilege', emoji:'🪜', title:'Nobody In Your Family Has Done This', body:'Your parents are proud but confused. They can\'t help with applications, funding letters, or "networking." Your roommate\'s mom is a professor. She reviewed his personal statement. You Googled "what is a CV."', cL:'Find a first-gen grad student group', cR:'Figure it out alone like you always do', eL:{bonds:+15, mind:+5}, eR:{mind:+5, bonds:-10} },

  { id:'partner_subsidy', tag:'Privilege', emoji:'💍', title:'The Two-Income Question', body:'Your labmate\'s partner is a software engineer. They split a nice apartment. They eat out. They don\'t check their bank balance before buying groceries. Your stipend is your only income. You check your balance before buying toothpaste.', cL:'Ask about shared housing options', cR:'Don\'t compare. Focus on your work.', eL:{wallet:+5, bonds:+10, mind:-10}, eR:{mind:-5, wallet:+5} },

  { id:'unwritten_rules', tag:'Privilege', emoji:'📖', title:'The Unwritten Rules', body:'There are rules nobody tells you. Which conferences matter. How to email a professor. When to say no. Who actually reads recommendation letters. Your advisor assumes you know these things. You do not.', cL:'Ask a senior student to mentor you', cR:'Watch and learn silently', eL:{bonds:+15, mind:-5}, eR:{mind:+5, bonds:-10} },
];

const PHASE2_CARDS = [
  { id:'advisor_ghost', tag:"Advisor", emoji:"📧", title:"Read Receipt: Seen 9 Days Ago", body:"You sent your advisor a draft chapter three weeks ago. You see the green dot next to their name on Slack. You watch it turn grey. It turns green again. They are typing... They stop.", cL:"Send a follow-up ping", cR:"Suffer in silence", eL:{bonds:-15, mind:-5}, eR:{mind:-15, bonds:-5} },
  { id:'meeting_cancel', tag:"Advisor", emoji:"📅", title:"'Let's Move the Meeting'", body:"Your advisor cancels your weekly 1-on-1 for the 4th time this month. New slot: 8am next Friday. You had plans. You no longer have plans.", cL:"'No problem at all!'", cR:"Reschedule to a real time", eL:{bonds:+5, mind:-15}, eR:{bonds:-5, mind:+10} },
  { id:'advisor_rewrite', tag:"Advisor", emoji:"🤔", title:"The Compliment-Critique Sandwich", body:"'This is really interesting work. But have you considered... literally everything from scratch? Anyway great stuff.' Your advisor sends a 2-page comment doc at 11:47pm.", cL:"Start over, no questions asked", cR:"Push back respectfully", eL:{mind:-15, bonds:+10}, eR:{bonds:-5, mind:+10} },
  { id:'conf_inspiration', tag:"Advisor", emoji:"🚀", title:"Conference Inspiration", body:"Your advisor just came back from a meeting. They forward you 3 papers from 1997. 'What if we also did this?' Your defense is in 18 months.", cL:"Add it to the pile", cR:"'That's a great future direction'", eL:{mind:-20, bonds:+15}, eR:{bonds:-10, mind:+10} },
  { id:'career_advice', tag:"Advisor", emoji:"💬", title:"The Unsolicited Career Advice", body:"Your advisor mentions, casually, that 'academia is very competitive' and 'industry is quite good these days.' They have tenure. They own a lake house.", cL:"Take it to heart (spiral)", cR:"Nod and pivot the conversation", eL:{mind:-15, bonds:-5}, eR:{bonds:+5, mind:-5} },
  { id:'sapelo_down', tag:"Pipeline Failure", emoji:"💥", title:"Sapelo2 Said No", body:"You submitted a 72-hour STAR alignment job last night. The cluster was down for maintenance. There was an email. It was sent at 3am.", cL:"Resubmit, modify nothing", cR:"Add --mail-type=ALL and weep", eL:{mind:-15, body:-5}, eR:{mind:-10, wallet:+5} },
  { id:'conda_hell', tag:"Pipeline Failure", emoji:"🐍", title:"conda activate bio_env", body:"CondaError: Environment not found. You have 47 conda environments. None of them are the right one. The one you need was on the old server. That server is gone.", cL:"Rebuild from scratch (2 days)", cR:"Use pip like an animal", eL:{mind:-10, bonds:+5}, eR:{mind:-5, bonds:-10, body:-5} },
  { id:'p_value', tag:"Pipeline Failure", emoji:"📊", title:"The p-value Was 0.049", body:"After 6 months of work, your key result has a p-value of 0.049. A reviewer will see this. You already know exactly what they're going to say.", cL:"Report it and brace yourself", cR:"Collect a bit more data", eL:{mind:-15, bonds:+5}, eR:{mind:-10, bonds:-5} },
  { id:'lab_fridge', tag:"Lab Politics", emoji:"🥪", title:"The Lab Fridge Situation", body:"Someone ate your clearly labeled leftovers. Again. The label said your name AND 'DO NOT EAT.' There's a passive-aggressive note on the fridge. It was written by the person who ate your food.", cL:"Send a lab-wide Slack message", cR:"Eat someone else's yogurt", eL:{mind:+5, bonds:-15}, eR:{mind:+15, bonds:-10, body:-5} },
  { id:'lab_meeting', tag:"Lab Politics", emoji:"🎤", title:"Lab Meeting Is Tomorrow", body:"You completely forgot it's your turn to present. You have slides from 6 months ago. They are wrong. Some figures don't exist anymore. You have 14 hours.", cL:"All-nighter, make new slides", cR:"Present the old slides confidently", eL:{mind:-20, body:-15}, eR:{mind:-10, bonds:-15}, sets:['pulled_allnighter'] },
  { id:'rotation_student', tag:"Lab Politics", emoji:"📢", title:"New Rotation Student", body:"A first-year has arrived. They are enthusiastic. They ask you 11 questions per hour. They installed a different Python version on the shared server.", cL:"Mentor them generously", cR:"Install a version manager and hide", eL:{bonds:+15, mind:-10}, eR:{mind:+5, bonds:-5}, sets:['mentored_student'] },
  { id:'not_eaten', tag:"Human Existence", emoji:"🍕", title:"It Is 11pm and You Haven't Eaten", body:"You meant to take a lunch break. You did not. It is 11pm. The dining halls are closed. There is one sad granola bar in your bag from 2024.", cL:"Eat the granola bar and go home", cR:"DoorDash ($18 delivery fee)", eL:{body:-10, mind:+5}, eR:{wallet:-8, body:+5, mind:+10} },
  { id:'friend_text', tag:"Human Existence", emoji:"💌", title:"Friend Texts: 'You Alive?'", body:"Your college friend texts for the first time in months. They just got promoted. They're going to Lisbon. They ask what you've been up to. You look at your screen: 43 open terminal windows.", cL:"'Still in PhD' (honest)", cR:"Suggest hanging out (lie)", eL:{bonds:+10, mind:-10}, eR:{bonds:+20, mind:-5} },
  { id:'pickleball', tag:"Human Existence", emoji:"🏓", title:"Pickleball at 2pm on a Tuesday?", body:"Someone in your cohort texts the group chat: pickleball at the rec, 2pm. You have work to do. You always have work to do. The sun is outside. You have a body.", cL:"Go. The work will still be there.", cR:"'Maybe next time'", eL:{body:+20, bonds:+15, mind:+10}, eR:{mind:-15, body:-10, wallet:+10} },
  { id:'stipend_late', tag:"Funding", emoji:"💸", title:"Stipend Arrived Late (Again)", body:"It's the 2nd of the month. Your stipend has not arrived. Rent was the 1st. Your credit card knows things about you now.", cL:"Email the graduate coordinator", cR:"Stress-buy a mechanical keyboard", eL:{wallet:+15, bonds:-5, mind:-5}, eR:{wallet:-10, mind:+15} },
  { id:'grant_deadline', tag:"Funding", emoji:"📝", title:"Grant Deadline: 48 Hours", body:"Your advisor forwarded a fellowship opportunity. Deadline: 48 hours. 'Seems perfect for you!' The application requires 3 essays, 2 references, and a 5-year plan.", cL:"Pull an all-nighter and apply", cR:"'I'll get the next one'", eL:{wallet:+20, mind:-20, body:-15}, eR:{mind:+5, body:+5}, sets:['applied_grant'] },
  { id:'linkedin', tag:"Existential Event", emoji:"🌘", title:"LinkedIn Notification", body:"Your undergrad classmate just posted a promotion to Senior ML Engineer. Their salary is listed. It is more than your 5-year stipend total. You close LinkedIn. You reopen LinkedIn.", cL:"Update your own profile", cR:"Touch grass, skill-bridge later", eL:{mind:-15, wallet:+5}, eR:{mind:+5, body:+10} },
  { id:'is_publishable', tag:"Existential Event", emoji:"📉", title:"'Is This Even Publishable?'", body:"It is 2am. You are reading a paper that does 70% of what you've spent 18 months on. It was published 3 months ago. The methods are different enough. Probably.", cL:"Panic-email your advisor right now", cR:"Sleep on it, reframe as 'complementary'", eL:{mind:-20, bonds:-10}, eR:{mind:-5, bonds:+5} },
  { id:'pipeline_runs', tag:"Rare Win", emoji:"🏆", title:"A Pipeline Finally Runs", body:"You submitted the job. It finished. The output files exist. They are the right size. The QC plots look... fine? Something went right. You don't know what. You're afraid to touch anything.", cL:"Celebrate, take the afternoon off", cR:"Immediately start the next analysis", eL:{mind:+20, bonds:+15, body:+10}, eR:{mind:+5, bonds:-5} },
  { id:'nih_freeze', tag:'Funding Crisis', emoji:'🧊', title:'NIH Funding Freeze', body:'Your PI\'s R01 renewal is under review. Then the news breaks: NIH is cutting $18 billion. Your stipend comes from that grant. Your PI says "don\'t worry." Their face says worry.', cL:'Start looking for backup funding', cR:'Trust that it\'ll work out', eL:{wallet:+5, mind:-15, bonds:-5}, eR:{mind:-10, bonds:+5} },
  { id:'rent_hike_v2', tag:'Athens Reality', emoji:'📈', title:'Athens Rent: +35% Since 2020', body:'Your landlord\'s email: rent is going up $150/month. Athens rents have risen 35% since 2020. Your stipend has risen 3%. Below inflation. You open Zillow. There is nothing cheaper.', cL:'Find a roommate', cR:'Absorb it and cut elsewhere', eL:{wallet:+5, bonds:+10, mind:-5}, eR:{wallet:-8, mind:-5, body:+5} },
  { id:'international_student', tag:'Lab Life', emoji:'🛂', title:'Your Labmate\'s Visa', body:'Your international labmate can\'t work off-campus. Can\'t freelance. Can\'t drive for DoorDash. Their stipend is the same $34,738, but they literally cannot supplement it. The system is designed this way.', cL:'Help them find campus resources', cR:'Just be there for them', eL:{bonds:+10, mind:-10}, eR:{bonds:+15, mind:-5} },
  { id:'nsf_cut', tag:'Funding Crisis', emoji:'📉', title:'NSF Fellowships: Halved', body:'1,000 fewer NSF Graduate Research Fellowships this year — a 50% cut. Your labmate applied. They were the strongest applicant you\'ve ever seen. The email came back: not funded. The money just isn\'t there.', cL:'Help them find alternatives', cR:'Process your own anxiety about funding', eL:{bonds:+10, mind:-10, wallet:-5}, eR:{mind:-15, wallet:+5} },
  { id:'side_gig', tag:'Temptation', emoji:'💻', title:'The Side Gig', body:'A biotech startup wants freelance bioinformatics. $75/hour. Your contract probably prohibits outside work. Your advisor would never know. Your rent is due in 6 days.', cL:'Take the gig quietly', cR:'Follow the rules, eat ramen', eL:{wallet:+20, mind:-10, bonds:-10}, eR:{wallet:-5, mind:+5, bonds:+5} },
  { id:'game_day', tag:'Athens Life', emoji:'🏈', title:'Game Day Weekend', body:'It\'s Georgia-Florida week. Your street has been colonized. There is a tailgate on your lawn. Your parking spot has been claimed by a man in a bulldog onesie. You cannot get to campus. Rent for your apartment this weekend on Airbnb: $800/night.', cL:'Embrace it (free food at tailgates)', cR:'Hide in the library', eL:{bonds:+15, body:+5, mind:-10}, eR:{mind:+10, bonds:-5} },
  { id:'someone_submitted', tag:"Lab Politics", emoji:"🏆", title:"Someone Submitted Before You", body:"A lab-mate 6 months behind you just submitted their dissertation. They're celebrating. There's cake. You eat the cake. The cake is good. You smile. Inside you are fine. Probably.", cL:"Celebrate genuinely (you're next)", cR:"Go home and work", eL:{bonds:+20, mind:-10}, eR:{mind:-15, bonds:-10} },
  { id:'reviewer_2', tag:"Peer Review", emoji:"👹", title:"Reviewer 2: The Reckoning", body:"'The authors fail to cite the seminal work by [Reviewer 2's own paper]. The methodology is fundamentally flawed. I recommend rejection.' The editor says: address all comments.", cL:"Write a 12-page rebuttal", cR:"Appeal to the editor", eL:{mind:-20, body:-10}, eR:{mind:-10, bonds:-5} },
  { id:'conf_accepted', tag:"Rare Win", emoji:"✉️", title:"Conference Acceptance", body:"Your abstract got accepted. You're going to a conference. There will be free food. Other humans will be there who care about the same obscure thing you do.", cL:"Prepare a killer talk", cR:"Network aggressively", eL:{mind:+20, bonds:+10}, eR:{bonds:+20, wallet:-10, mind:+10} },
  { id:'reviewer_1', tag:"Rare Win", emoji:"🤝", title:"Reviewer 1 Was Reasonable", body:"The reviews are back. Reviewer 1 has minor revisions. Reviewer 2 has... concerns. But Reviewer 1 was reasonable. You hold this close to your heart.", cL:"Address Reviewer 1 first, gain confidence", cR:"Tackle Reviewer 2 head-on", eL:{mind:+15}, eR:{mind:-10, bonds:+10} },
  { id:'github_down', tag:"Pipeline Failure", emoji:"🐙", title:"GitHub Is Down", body:"You can't push. You can't pull. Your entire workflow is a series of git operations. You sit there. You refresh. You refresh again. You contemplate local backups.", cL:"Work on writing instead", cR:"Refresh every 30 seconds for an hour", eL:{mind:+5}, eR:{mind:-5, body:-5} },
  { id:'kallisto', tag:"Pipeline Failure", emoji:"🧬", title:"kallisto v0.46.1 vs v1.0.0", body:"You realize you ran half your samples with kallisto 0.46.1 and the other half with 1.0.0 — after the quantification algorithm fundamentally changed. The numbers don't match.", cL:"Re-run everything (3 weeks)", cR:"Note it as a 'minor version difference'", eL:{mind:-15, bonds:+15}, eR:{mind:-5, bonds:-20} },
  { id:'scratch_purge', tag:"Pipeline Failure", emoji:"🔥", title:"The Scratch Directory Was Purged", body:"Files not accessed in 90 days were deleted from /scratch. You had not accessed them in 91 days. Your intermediate BAM files are gone.", cL:"Re-run the entire alignment", cR:"See if anything survives in /home", eL:{mind:-15, body:-10}, eR:{mind:+5, body:-5} },
  { id:'job_pending', tag:"Pipeline Failure", emoji:"⏳", title:"Job Pending: 6 Days", body:"Your job has been in PENDING state on Sapelo2 for 6 days. You requested 128GB RAM. The queue is full. You refresh squeue every hour like a ritual.", cL:"Cancel and resubmit with less RAM", cR:"Trust the process (keep waiting)", eL:{mind:-10, bonds:-5}, eR:{mind:-15, body:+5} },
  // --- Academic Marketing ---
  { id:'academic_twitter', tag:'Marketing', emoji:'📱', title:'Your Advisor Asks About Your "Online Presence"', body:'They want you on Academic Twitter. Posting threads about your research. Making "graphical abstracts." You came here to do science. Now you\'re a content creator with a pipette.', cL:'Build the brand (it\'s the game now)', cR:'Post once, forget the password', eL:{bonds:+10, mind:-15, body:-5}, eR:{mind:+5, bonds:-10} },

  { id:'personal_website', tag:'Marketing', emoji:'🌐', title:'The Personal Website', body:'Every job posting says "link to personal website." You don\'t have one. You spend a weekend learning HTML. The result looks like 2004. Your labmate hired a designer. Their stipend is the same as yours.', cL:'Keep tweaking it yourself', cR:'Use a free template and move on', eL:{mind:-10, wallet:+5}, eR:{mind:+5, bonds:-5} },

  { id:'graphical_abstract', tag:'Marketing', emoji:'🎨', title:'The Graphical Abstract', body:'The journal requires a graphical abstract. You are a bioinformatician. You have never used Illustrator. You open Canva. Three hours later you have a diagram that looks like it was made by a confident child.', cL:'Learn Illustrator (3 days)', cR:'Submit the Canva version', eL:{mind:-15, bonds:+10}, eR:{mind:+5, bonds:-5} },

  // --- Teaching Labor ---
  { id:'ta_overload', tag:'Teaching Labor', emoji:'📚', title:'Two TA Sections This Semester', body:'Your department needs bodies. You\'re teaching two sections of intro bio — 480 students total. Your advisor says this "shouldn\'t affect your research." It will. Your stipend stays the same whether you TA one section or five.', cL:'Push back and request one section', cR:'Take both — you need the funding', eL:{bonds:-10, mind:+10, body:+5}, eR:{body:-15, mind:-10, wallet:+10} },

  { id:'student_crisis', tag:'Teaching Labor', emoji:'😢', title:'A Student Emails You at 1am', body:'Subject: "I can\'t do this anymore." It\'s a first-year undergrad in your section. You\'re not trained for this. You\'re barely managing your own mental health. But you\'re the adult in the room. At 1am. For $34,738/year.', cL:'Respond and connect them to resources', cR:'Forward to the professor of record', eL:{bonds:+10, mind:-15, body:-10}, eR:{mind:-5, bonds:-5} },

  { id:'teaching_doesnt_count', tag:'Teaching Labor', emoji:'🚫', title:'"Teaching Doesn\'t Count"', body:'You won a teaching award. Your students wrote thank-you notes. Your advisor says: "That\'s nice, but what about the paper?" On the job market, your teaching portfolio is worth zero. The university charges $4,000/credit for the course you teach for $1,400/month.', cL:'Keep investing in teaching anyway', cR:'Minimize teaching, maximize publications', eL:{bonds:+15, mind:+10, wallet:-5}, eR:{mind:+5, bonds:-5, wallet:+5} },

  // --- Mental Health ---
  { id:'therapy_waitlist', tag:'Mental Health', emoji:'🧠', title:'The Counseling Center Waitlist', body:'You finally called. They have a 6-week waitlist for ongoing therapy. They offer you a single "crisis consultation" this Thursday. You\'re not in crisis. You\'re just slowly dissolving. That doesn\'t qualify.', cL:'Take the crisis slot anyway', cR:'Look for off-campus therapy ($150/session)', eL:{mind:+10, bonds:+5}, eR:{mind:+15, wallet:-8} },

  { id:'comparison_spiral', tag:'Existential Event', emoji:'📊', title:'The Google Scholar Spiral', body:'You check your citation count. Then your labmate\'s. Then that person from the conference. Then a 25-year-old with 3 Nature papers. Two hours pass. You have accomplished nothing except cataloguing your own inadequacy.', cL:'Close the tab, go for a walk', cR:'Use it as motivation to work harder', eL:{mind:+10, body:+10, bonds:+5}, eR:{mind:-10, wallet:+5} },

  { id:'medication_cost', tag:'Mental Health', emoji:'💊', title:'The Prescription Question', body:'Your therapist recommends medication. Your insurance covers it — with a $40 copay per month. That\'s 16% of your after-rent monthly budget. The medication might help you function. The cost might stress you out more.', cL:'Start the medication', cR:'Try to manage without it', eL:{mind:+15, wallet:-10, body:+5}, eR:{mind:-10, body:-5, wallet:+5} },

  // --- Privilege & Equity (Phase 2) ---
  { id:'authorship_politics', tag:'Privilege', emoji:'📝', title:'The Authorship Question', body:'You did 80% of the analysis. The PI\'s favorite postdoc "supervised" by answering two emails. Guess who\'s first author. You look at the draft. Your name is third. Behind someone who joined the project last month.', cL:'Advocate for first authorship', cR:'Accept it — you need the publication', eL:{bonds:-15, mind:+15}, eR:{mind:-15, bonds:+5} },

  { id:'unpaid_summer', tag:'Privilege', emoji:'☀️', title:'The Summer Funding Gap', body:'Your RA funding covers 9 months. Summer is "unfunded." Your advisor says you should "write grants." Your classmate whose parents send rent money doesn\'t notice. You notice. You have $1,200 in savings.', cL:'Apply for every summer fellowship', cR:'Get a summer job outside academia', eL:{wallet:+10, mind:-15, bonds:+5}, eR:{wallet:+15, mind:+5, bonds:-10} },

  { id:'gender_dynamics', tag:'Privilege', emoji:'⚖️', title:'The Interrupted Presentation', body:'You\'re presenting at lab meeting. A male postdoc interrupts to "add context." He explains your own figure to the room. Your advisor nods along. Nobody else notices. You notice.', cL:'Reclaim the floor firmly', cR:'Let it go, finish your slides', eL:{mind:+10, bonds:-10}, eR:{mind:-15, bonds:+5} },

  // --- Unpredictable Life Events ---
  { id:'car_accident', tag:'Life Event', emoji:'🚨', title:'The Intersection on Baxter Street', body:'It happens on a Tuesday. Someone runs the light on Baxter. Your car is totaled. You\'re okay — bruised ribs, whiplash, a $500 ER copay. Your insurance deductible is $1,000. Your advisor asks when you\'ll be back in lab.', cL:'Take a week to recover', cR:'Go back to lab in 2 days', eL:{body:+10, mind:+5, wallet:-10, bonds:+5}, eR:{body:-10, mind:-5, wallet:-8, bonds:+10} },

  { id:'family_emergency', tag:'Life Event', emoji:'🏥', title:'The Phone Call at 3pm', body:'Your mom is in the hospital. It\'s not life-threatening, but it\'s not nothing. The flight home is $400. Your advisor says "family comes first" but the grant deadline is Friday. You can hear it in their voice.', cL:'Fly home immediately', cR:'Stay and call every night', eL:{bonds:+15, wallet:-10, mind:-10}, eR:{mind:-10, bonds:-5, wallet:+5} },

  { id:'pandemic_echo', tag:'Black Swan', emoji:'🦠', title:'The Next Variant', body:'A new respiratory virus is circulating. UGA sends a vague email. Your international labmate can\'t risk getting sick — their visa medical clearance would be jeopardized. The library is half empty. Nobody\'s sure if this is real or a drill.', cL:'Switch to remote work preemptively', cR:'Keep coming to lab as normal', eL:{mind:+5, bonds:-10, body:+10}, eR:{body:-15, mind:-5, bonds:+5} },

  { id:'federal_shutdown', tag:'Black Swan', emoji:'🏛️', title:'Government Shutdown', body:'The federal government shuts down. NIH stops processing grants. NSF pauses reviews. Your PI\'s renewal is frozen. Nobody\'s getting fired — yet. But the stipend conversation that was "coming soon" is now "on hold indefinitely."', cL:'Start emergency savings mode', cR:'Assume it\'ll resolve and keep working', eL:{wallet:+5, mind:-10, body:-5}, eR:{mind:-5, wallet:-10} },

  { id:'housing_crisis', tag:'Black Swan', emoji:'🏚️', title:'Your Landlord Sells the Building', body:'The email arrives on a Friday. New owner. "Renovations planned." Your lease isn\'t being renewed. Athens has a 2.1% vacancy rate. You have 60 days to find housing you can afford on $34,738/year. In a college town. During move-in season.', cL:'Ask cohort if anyone has a room', cR:'Expand search to 30-minute commute', eL:{bonds:+15, wallet:-5, mind:-10}, eR:{body:-5, wallet:-5, mind:+5} },

  { id:'lab_flood', tag:'Black Swan', emoji:'🌊', title:'The Lab Flooded', body:'A pipe burst overnight in the building. Your bench is underwater. Three months of samples are destroyed. The freezer lost power. Your advisor stares at the ceiling. Insurance doesn\'t cover "academic materials." Nobody\'s materials are insured.', cL:'Salvage what you can, rebuild', cR:'Take a mental health day first', eL:{mind:-15, body:-10, bonds:+10}, eR:{mind:+5, body:+10, bonds:-5} },

  { id:'war_funding', tag:'Black Swan', emoji:'🌍', title:'Geopolitics Hits Your Funding', body:'A conflict escalates overseas. Congress redirects discretionary spending. Your PI\'s DOD supplement — the one paying your summer stipend — is "under review." Geopolitics was not in your dissertation proposal. It\'s in your bank account now.', cL:'Diversify funding sources immediately', cR:'Wait for the political cycle to pass', eL:{wallet:+5, mind:-15, bonds:-5}, eR:{wallet:-10, mind:-10} },

  // --- More realism cards ---
  { id:'no_sick_days', tag:'Athens Reality', emoji:'🤒', title:'Grad Students Don\'t Get Sick Days', body:'You have the flu. Real flu, not "I need a day" flu. Your advisor asks if you can review the manuscript "from bed." There is no HR. There is no sick leave policy. There is you, a laptop, and a fever of 102.', cL:'Set a boundary: you\'re offline today', cR:'Review it from bed, half-delirious', eL:{body:+15, mind:+10, bonds:-10}, eR:{body:-10, mind:-5, bonds:+10} },

  { id:'dental_emergency', tag:'Life Event', emoji:'🦷', title:'The Dental Emergency', body:'You cracked a tooth on a popcorn kernel. Student dental insurance covers cleanings. It does not cover crowns. The dentist quotes $1,200. Your emergency fund is $340. You briefly consider superglue.', cL:'Set up a payment plan', cR:'Get the minimum fix and hope', eL:{wallet:-8, body:+10, mind:-5}, eR:{wallet:-5, body:-5, mind:-10} },

  { id:'recommendation_favor', tag:'Academic Politics', emoji:'✉️', title:'The Recommendation Letter Economy', body:'A professor you barely know asks you to TA their course as a "favor." In exchange: a strong recommendation letter. The course is 15 hours/week. The letter is two paragraphs. This is how academic currency works.', cL:'Do the favor (invest in the relationship)', cR:'Decline politely — you\'re stretched thin', eL:{bonds:+15, body:-15, mind:-5}, eR:{mind:+10, bonds:-10} },

  // --- CRUEL CARDS (both choices hurt) ---
  { id:'advisor_poached', tag:'Cruel', emoji:'💀', title:'Your Advisor Is Poaching Your Idea', body:'You overhear your PI pitching YOUR research angle to a collaborator. Your framing. Your figure concept. They don\'t credit you. You\'re standing right there. They don\'t even look at you.', cL:'Confront them directly', cR:'Say nothing, document everything', eL:{bonds:-20, mind:+10}, eR:{mind:-15, bonds:-10} },

  { id:'scooped', tag:'Cruel', emoji:'🔪', title:'You Got Scooped', body:'A lab in Shanghai published your exact hypothesis with better data. Your 14 months of work is now "a replication study." Your advisor says "science moves fast." You stare at the wall for an hour.', cL:'Pivot the entire project', cR:'Publish anyway as complementary work', eL:{mind:-20, bonds:-5, body:-10}, eR:{mind:-15, bonds:+5} },

  { id:'cohort_dropout', tag:'Cruel', emoji:'👋', title:'Half Your Cohort Just Left', body:'Three people quit this month. One got a job at Google. One "took a leave." One just stopped showing up. The department emails about "maintaining community." The office is emptier. The silence is loud.', cL:'Reach out to the ones who left', cR:'Focus on your own survival', eL:{bonds:+5, mind:-20}, eR:{mind:-10, bonds:-15} },

  { id:'funding_terminated', tag:'Cruel', emoji:'🚨', title:'Your Funding Line Is Being Cut', body:'The department email is carefully worded. "Restructuring of RA positions." Translation: your funding ends in May. Your advisor says they\'re "looking into it." It is March. You have two months of certainty left.', cL:'Apply to every fellowship you can find', cR:'Start interviewing for industry jobs', eL:{mind:-15, wallet:+5, body:-10}, eR:{wallet:+10, mind:-10, bonds:-10} },

  { id:'data_breach', tag:'Cruel', emoji:'🔓', title:'Your Data Was on That Server', body:'The department server was compromised. Your raw sequencing data — 6 months of collection — was on an unbackuped partition. IT says recovery is "unlikely." Your advisor asks why you didn\'t use the cloud. The cloud costs money you don\'t have.', cL:'Recontact all collaborators for re-runs', cR:'Try to reconstruct from processed outputs', eL:{bonds:-10, mind:-15, body:-10}, eR:{mind:-20, body:-5} },

  { id:'retaliation', tag:'Cruel', emoji:'⚖️', title:'You Reported a Problem. It Backfired.', body:'You raised a legitimate concern about lab safety to the department. The investigation cleared your PI. Now your PI knows you reported them. The "collaborative" relationship has become professionally cordial. Your recommendation letter just got shorter.', cL:'Transfer labs (start over)', cR:'Stay and rebuild trust', eL:{bonds:-20, mind:+5, wallet:-5}, eR:{mind:-15, bonds:-10} },

  { id:'grade_dispute_escalation', tag:'Cruel', emoji:'📣', title:'A Student Filed a Complaint About You', body:'You gave a student a C on a lab report. They emailed the dean. The dean emailed your advisor. Your advisor emailed you at 11pm. Now you have a meeting. You are a TA making $21,459/year and you are being investigated for grading.', cL:'Apologize and change the grade', cR:'Stand by your grading', eL:{mind:-10, bonds:-15}, eR:{mind:-15, bonds:-5, body:-5} },

function getPhase(semester) {
  if (semester <= 2) return 1;
  if (semester <= 6) return 2;
  return 3;
}

let save = { version: 2, endings: [], archetypes: ['overachiever', 'imposter'], totalRuns: 0, totalDeaths: 0, bestSemester: 0 };
let gameState = {
  phase: 'title', archetype: null, st: {mind:50, body:50, wallet:50, bonds:50}, semester: 1, cardCount: 0,
  totalCards: 0, memory: [], currentCard: null, ending: null, cause: null, nextMilestone: null
};

function loadSave() {
  try { save = JSON.parse(localStorage.getItem(SAVE_KEY)) || save; } catch (e) {}
}
function saveSave() { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }

function selectArchetype(arch) {
  gameState.archetype = arch;
  const startStats = ARCHETYPE_DATA[arch].st;
  gameState.st = {...startStats};
  gameState.semester = 1;
  gameState.totalCards = 0;
  gameState.cardCount = 0;
  gameState.memory = [];
  gameState.currentCard = null;
  gameState.ending = null;
  gameState.cause = null;
  gameState.nextMilestone = null;
  gameState.phase = 'play';
  save.totalRuns++;
  startNextSemester();
  render();
}

function startNextSemester() {
  // Don't reset cardCount here — drawCard needs it >= 3 to serve the milestone
  const ms = getMilestoneForSemester(gameState.semester);
  gameState.nextMilestone = ms;
}

function getMilestoneForSemester(sem) {
  return MILESTONE_CARDS.find(c => c.semester === sem) || null;
}

function drawCard() {
  const phase = getPhase(gameState.semester);
  let cardPool = [];
  if (phase === 1) cardPool = PHASE1_CARDS;
  else if (phase === 2) cardPool = PHASE2_CARDS;
  else cardPool = PHASE3_CARDS;

  cardPool = cardPool.concat(UNIVERSAL_CARDS);
  // Filter by semester range (cards with minSem/maxSem only appear in that window)
  const sem = gameState.semester;
  cardPool = cardPool.filter(c => {
    if (c.minSem && sem < c.minSem) return false;
    if (c.maxSem && sem > c.maxSem) return false;
    return true;
  });
  cardPool = cardPool.filter(c => !gameState.memory.includes(c.id));
  cardPool = cardPool.concat(CALLBACK_CARDS.filter(c => {
    if (gameState.memory.includes(c.id)) return false;
    if (c.requires && !c.requires.every(r => gameState.memory.includes(r))) return false;
    return true;
  }));

  if (gameState.archetype === 'organizer') {
    cardPool = cardPool.concat(ORGANIZER_CARDS.filter(c => !gameState.memory.includes(c.id)));
  }

  // Serve milestone card after 5 regular cards, if one exists for this semester
  if (gameState.cardCount >= 3 && gameState.nextMilestone) {
    const ms = gameState.nextMilestone;
    gameState.nextMilestone = null;
    gameState.cardCount = 0; // Reset for next semester's regular cards
    return ms;
  }
  // If semester advanced but no milestone, reset for next semester
  if (gameState.cardCount >= 3) {
    gameState.cardCount = 0;
  }

  if (cardPool.length === 0) cardPool = UNIVERSAL_CARDS.filter(c => !gameState.memory.includes(c.id));
  if (cardPool.length === 0) {
    gameState.phase = 'ending';
    gameState.ending = 'defended';
    return null;
  }

  return cardPool[Math.floor(Math.random() * cardPool.length)];
}

function choose(side) {
  const card = gameState.currentCard;
  if (!card) return;

  let effects = side === 'left' ? card.eL : card.eR;

  if (side === 'left' && card.industry) {
    gameState.phase = 'ending';
    gameState.ending = card.industry;
    gameState.cause = 'Career Choice';
    return render();
  }

  if (card.milestone && side === 'right' && card.id === 'ms_defense_sched' && gameState.memory.includes('defense_delayed')) {
    gameState.phase = 'ending';
    gameState.ending = 'abd';
    gameState.cause = 'Delayed Too Long';
    return render();
  }

  if (!effects) {
    gameState.cardCount++;
    gameState.totalCards++;
    gameState.semester++;
    startNextSemester();
    gameState.currentCard = drawCard();
    render();
    return;
  }

  Object.entries(effects).forEach(([stat, delta]) => {
    let finalDelta = applyPerk(gameState.archetype, stat, delta, card);
    gameState.st[stat] = Math.max(0, Math.min(100, gameState.st[stat] + finalDelta));
  });

  if (gameState.archetype === 'overachiever') {
    const weakStats = Object.entries(gameState.st).filter(([s, v]) => v < 20);
    if (weakStats.length > 0) {
      const [weakStat] = weakStats[Math.floor(Math.random() * weakStats.length)];
      gameState.st[weakStat] = Math.min(100, gameState.st[weakStat] + 5);
    }
  }

  if (gameState.archetype === 'coaster') {
    if (gameState.st.mind < 15) gameState.st.mind = 15;
    if (gameState.st.body < 15) gameState.st.body = 15;
  }

  // FINANCIAL STRESS MECHANIC: low wallet drains mind and body (money stress causes burnout)
  // Wallet itself has a floor of 5 — you don't literally go to $0, you go into debt and suffer
  if (gameState.st.wallet < 5) gameState.st.wallet = 5;
  if (gameState.st.wallet < 20) {
    gameState.st.mind = Math.max(0, gameState.st.mind - 3);
    gameState.st.body = Math.max(0, gameState.st.body - 2);
  }

  if (card.sets) card.sets.forEach(flag => { if (!gameState.memory.includes(flag)) gameState.memory.push(flag); });
  gameState.memory.push(card.id);

  gameState.totalCards++;
  gameState.cardCount++;

  // Check endings based on which stat died
  const phase = getPhase(gameState.semester);
  if (gameState.st.wallet <= 0) { gameState.phase='ending'; gameState.ending='broke'; gameState.cause='Wallet'; return render(); }
  if (gameState.st.body <= 0) { gameState.phase='ending'; gameState.ending='burned_out'; gameState.cause='Body'; return render(); }
  if (gameState.st.mind <= 0) { gameState.phase='ending'; gameState.ending=(phase<=2?'mastered_out':'abd'); gameState.cause='Mind'; return render(); }
  if (gameState.st.bonds <= 0) { gameState.phase='ending'; gameState.ending=(phase<=2?'mastered_out':'abd'); gameState.cause='Bonds'; return render(); }
  if (gameState.memory.includes('defended')) { gameState.phase='ending'; gameState.ending='defended'; return render(); }
  if (gameState.semester > 10 && !gameState.memory.includes('defended')) { gameState.phase='ending'; gameState.ending='abd'; gameState.cause='Time'; return render(); }

  if (gameState.cardCount >= 3) {
    gameState.semester++;
    startNextSemester();
  }

  gameState.currentCard = drawCard();
  render();
}

function applyPerk(arch, stat, delta, card) {
  switch(arch) {
    case 'imposter':
      if (stat === 'bonds' && delta < 0) return Math.ceil(delta / 2);
      if (stat === 'mind' && delta < 0 && card && card.tag === 'Existential Event') return delta * 2;
      break;
    case 'believer':
      if (gameState.totalCards % 5 === 0 && stat === 'mind') return delta + 10;
      if (stat === 'wallet' && delta < 0) return Math.floor(delta * 1.3);
      break;
    case 'organizer':
      if (delta < 0 && gameState.st.bonds > 50) return Math.min(delta + 3, 0);
      break;
  }
  return delta;
}

let dragStart = 0, dragCurrent = 0;
function startDrag(e) {
  dragStart = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
  dragCurrent = dragStart;
}
function moveDrag(e) {
  if (dragStart === 0) return;
  dragCurrent = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
  const card = document.getElementById('card');
  if (!card) return;
  const delta = dragCurrent - dragStart;
  const rot = delta * 0.05;
  card.style.transform = `translateX(${delta * 0.5}px) rotateZ(${rot}deg)`;
  if (delta < -30) {
    document.getElementById('hintL').classList.add('show');
    document.getElementById('hintR').classList.remove('show');
  } else if (delta > 30) {
    document.getElementById('hintR').classList.add('show');
    document.getElementById('hintL').classList.remove('show');
  } else {
    document.getElementById('hintL').classList.remove('show');
    document.getElementById('hintR').classList.remove('show');
  }
}
function endDrag(e) {
  const card = document.getElementById('card');
  if (!card) return;
  const delta = dragCurrent - dragStart;
  dragStart = 0;
  dragCurrent = 0;
  card.style.transform = '';
  document.getElementById('hintL').classList.remove('show');
  document.getElementById('hintR').classList.remove('show');
  if (delta < -70) choose('left');
  else if (delta > 70) choose('right');
}

  });
  // Scroll into view
  if (cards[index]) cards[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.addEventListener('keydown', function(e) {
  // Close help on Escape or any key
  if (helpVisible) {
    closeHelp();
    e.preventDefault();
    return;
  }

  const key = e.key;

  // TITLE SCREEN: Space/Enter to begin
  if (gameState.phase === 'title') {
    if (key === ' ' || key === 'Enter') {
      e.preventDefault();
      gameState.phase = 'archetype';
      menuIndex = 0;
      render();
      setTimeout(() => highlightArchetype(0), 50);
    }
    return;
  }

  // ARCHETYPE SCREEN: Up/Down/W/S to navigate, Space/Enter to select
  if (gameState.phase === 'archetype') {
    const selectable = getSelectableArchetypes();
    if (key === 'ArrowUp' || key === 'w' || key === 'W') {
      e.preventDefault();
      menuIndex = (menuIndex - 1 + selectable.length) % selectable.length;
      highlightArchetype(menuIndex);
    } else if (key === 'ArrowDown' || key === 's' || key === 'S') {
      e.preventDefault();
      menuIndex = (menuIndex + 1) % selectable.length;
      highlightArchetype(menuIndex);
    } else if (key === ' ' || key === 'Enter') {
      e.preventDefault();
      const arch = selectable[menuIndex];
      if (arch) selectArchetype(arch);
    }
    return;
  }

  // PLAY SCREEN: Left/Right/A/D to choose, ? for help
  if (gameState.phase === 'play' && gameState.currentCard) {
    if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
      e.preventDefault();
      choose('left');
    } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
      e.preventDefault();
      choose('right');
    } else if (key === '?' || key === 'h' || key === 'H') {
      e.preventDefault();
      showHelp();
    }
    return;
  }

  // ENDING SCREEN: Space/Enter to play again
  if (gameState.phase === 'ending') {
    if (key === ' ' || key === 'Enter') {
      e.preventDefault();
      gameState.phase = 'archetype';
      gameState.ending = null;
      gameState.currentCard = null;
      menuIndex = 0;
      render();
      setTimeout(() => highlightArchetype(0), 50);
    }
    return;
  }
});

loadSave();
render();
</script>
</body>
</html>
